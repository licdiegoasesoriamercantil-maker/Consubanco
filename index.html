    // ===================== REGLAS =====================
    const AGENTES_ESPECIALES = [
        "PAMELA VALERIA  ARELLANO MARADIAGA", "JESUS ANGEL ZAVALA SANCHEZ", "JATZIRI NOHEMI SANCHEZ ARELLANO",
        "JAIME PACHECO GONZALEZ", "STEFAN ARROYO OCHOA", "WENDY VERONICA BAEZ MONROY", 
        "PAULA BENITEZ RODRIGUEZ", "EVELYN TAMARA LARIOS RUBIO"
    ];
    
    const REGLAS = {
        normal: { comida: 60, bano: 15, retro: 10, conexionHoras: 9 },
        especial: { comida: 20, bano: 10, retro: 10, conexionHoras: 6 }
    };
    
    // Días laborales por periodo
    const DIAS_LABORALES = {
        dia: 1,
        semana: 6,
        mes: 20
    };
    
    function getTipo(nombre) { 
        return AGENTES_ESPECIALES.includes(nombre) ? "especial" : "normal"; 
    }
    
    function formatearTiempo(minutos) {
        if (minutos >= 60) return `${(minutos/60).toFixed(1)} h`;
        return `${minutos.toFixed(1)} min`;
    }
    
    function getWeekNumber(d) {
        const date = new Date(d.getTime());
        date.setHours(0,0,0,0);
        date.setDate(date.getDate() + 3 - (date.getDay() + 6) % 7);
        const week1 = new Date(date.getFullYear(), 0, 4);
        return 1 + Math.round(((date - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
    }
    
    function procesarPeriodo(data, periodo, valor) {
        let filtrados = data;
        if (periodo === 'dia') filtrados = data.filter(d => d.Fecha === valor);
        if (periodo === 'semana') {
            let semanaNum = parseInt(valor);
            filtrados = data.filter(d => getWeekNumber(new Date(d.Fecha)) === semanaNum);
        }
        if (periodo === 'mes') filtrados = data.filter(d => d.Fecha.startsWith(valor));
        return filtrados;
    }
    
    // Obtener el periodo actual para saber cuántos días multiplicar
    let periodoActual = 'dia';
    
    function agruparPorAgente(data, periodo) {
        let map = new Map();
        let diasMultiplicador = DIAS_LABORALES[periodo] || 1;
        
        for (let row of data) {
            let nom = row.Nombre;
            if (!map.has(nom)) {
                map.set(nom, { 
                    nombre: nom, 
                    disponible: 0, enLlamada: 0, despues: 0, pausaTotal: 0, 
                    llamadas: 0, totalConexionMinutos: 0,
                    comidaTotal: 0, banoTotal: 0, retroTotal: 0,
                    registros: 0
                });
            }
            let acc = map.get(nom);
            acc.disponible += row.DISPONIBLE || 0;
            acc.enLlamada += row.EN_LLAMADA || 0;
            acc.despues += row.DESPUES_LLAMADA || 0;
            acc.pausaTotal += row.PAUSA || 0;
            acc.llamadas += row.Llamadas || 0;
            acc.totalConexionMinutos += row.Total || 0;
            acc.comidaTotal += row.PAUSECOMIDA || 0;
            acc.banoTotal += row.PAUSEBAÑO || 0;
            acc.retroTotal += row.PAUSERETRO || 0;
            acc.registros++;
        }
        
        // Calcular diferencias basadas en días del periodo
        let resultados = [];
        for (let acc of map.values()) {
            let tipo = getTipo(acc.nombre);
            let limites = REGLAS[tipo];
            
            // Diferencias multiplicadas por días laborales
            let comidaEsperada = limites.comida * diasMultiplicador;
            let banoEsperado = limites.bano * diasMultiplicador;
            let retroEsperado = limites.retro * diasMultiplicador;
            let conexionEsperadaHoras = limites.conexionHoras * diasMultiplicador;
            let conexionEsperadaMinutos = conexionEsperadaHoras * 60;
            
            acc.diffComida = acc.comidaTotal - comidaEsperada;
            acc.diffBano = acc.banoTotal - banoEsperado;
            acc.diffRetro = acc.retroTotal - retroEsperado;
            acc.diffConexion = acc.totalConexionMinutos - conexionEsperadaMinutos;
            acc.conexionEsperadaHoras = conexionEsperadaHoras;
            acc.diasMultiplicador = diasMultiplicador;
            
            resultados.push(acc);
        }
        return resultados;
    }
    
    let charts = {};
    let datosGlobales = datosCompletos;
    
    function actualizarOpciones(periodo) {
        let valores = new Set();
        if (periodo === 'dia') {
            datosGlobales.forEach(d => valores.add(d.Fecha));
        } else if (periodo === 'semana') {
            datosGlobales.forEach(d => valores.add(getWeekNumber(new Date(d.Fecha))));
        } else {
            datosGlobales.forEach(d => valores.add(d.Fecha.substring(0,7)));
        }
        let arr = Array.from(valores).sort();
        let sel = document.getElementById('valorSelect');
        sel.innerHTML = '';
        arr.forEach(v => {
            let label = (periodo === 'semana') ? `Semana ${v}` : v;
            sel.appendChild(new Option(label, v));
        });
        if (arr.length) sel.value = arr[0];
    }
    
    function renderDashboard() {
        let periodo = document.getElementById('periodoSelect').value;
        let valor = document.getElementById('valorSelect').value;
        periodoActual = periodo;
        
        if (!valor || !datosGlobales.length) return;
        
        let filtrados = procesarPeriodo(datosGlobales, periodo, valor);
        let agentes = agruparPorAgente(filtrados, periodo);
        
        if (!agentes.length) { 
            document.getElementById('tablaResumen').innerHTML = '<p>Sin datos en este periodo</p>'; 
            return;
        }
        
        // Ordenar agentes alfabéticamente
        agentes.sort((a,b) => a.nombre.localeCompare(b.nombre));
        
        const labels = agentes.map(a => a.nombre.length > 28 ? a.nombre.substring(0,25)+'…' : a.nombre);
        
        // Tiempos en horas
        const dispHoras = agentes.map(a => a.disponible/60);
        const llamadaHoras = agentes.map(a => a.enLlamada/60);
        const despuesHoras = agentes.map(a => a.despues/60);
        const pausaHoras = agentes.map(a => a.pausaTotal/60);
        
        // Gráfico 1: Tiempos
        if (charts.tiempos) charts.tiempos.destroy();
        const ctxTiempos = document.getElementById('chartTiempos').getContext('2d');
        charts.tiempos = new Chart(ctxTiempos, {
            type: 'bar', 
            data: { labels, datasets: [
                { label: 'Disponible (horas)', data: dispHoras, backgroundColor: '#2c7da0' },
                { label: 'En llamada (horas)', data: llamadaHoras, backgroundColor: '#61a5c2' },
                { label: 'Después llamada (horas)', data: despuesHoras, backgroundColor: '#89c2d9' },
                { label: 'Pausa total (horas)', data: pausaHoras, backgroundColor: '#c7d9dd' }
            ] }, 
            options: { responsive: true, maintainAspectRatio: true }
        });
        
        // Gráfico 2: Cumplimiento de pausas
        if (charts.cumplimiento) charts.cumplimiento.destroy();
        const ctxCumplimiento = document.getElementById('chartCumplimiento').getContext('2d');
        charts.cumplimiento = new Chart(ctxCumplimiento, {
            type: 'bar', 
            data: { labels, datasets: [
                { label: 'Diferencia Comida/Break (min)', data: agentes.map(a=>a.diffComida), backgroundColor: '#e9c46a' },
                { label: 'Diferencia Baño (min)', data: agentes.map(a=>a.diffBano), backgroundColor: '#f4a261' },
                { label: 'Diferencia Retro (min)', data: agentes.map(a=>a.diffRetro), backgroundColor: '#e76f51' }
            ] }, 
            options: { responsive: true }
        });
        
        // Gráfico 3: Excesos
        let excLabels=[], excC=[], excB=[], excR=[];
        agentes.forEach(a=>{
            if(a.diffComida>0 || a.diffBano>0 || a.diffRetro>0){
                excLabels.push(a.nombre.length>25 ? a.nombre.substring(0,22)+'…' : a.nombre);
                excC.push(a.diffComida>0 ? a.diffComida : 0);
                excB.push(a.diffBano>0 ? a.diffBano : 0);
                excR.push(a.diffRetro>0 ? a.diffRetro : 0);
            }
        });
        
        if (charts.excesos) charts.excesos.destroy();
        const ctxExcesos = document.getElementById('chartExcesos').getContext('2d');
        if(excLabels.length){
            charts.excesos = new Chart(ctxExcesos, {
                type: 'bar', 
                data: { labels: excLabels, datasets: [
                    { label:'Exceso Comida/Break (min)', data:excC, backgroundColor:'#e63946' },
                    { label:'Exceso Baño (min)', data:excB, backgroundColor:'#f4a261' },
                    { label:'Exceso Retro (min)', data:excR, backgroundColor:'#d62828' }
                ] }, 
                options: { responsive: true }
            });
        } else {
            charts.excesos = new Chart(ctxExcesos, { type: 'bar', data: { labels: [], datasets: [] } });
            ctxExcesos.fillStyle = '#2c7da0';
            ctxExcesos.font = '14px sans-serif';
            ctxExcesos.fillText('✅ No hay excesos de pausas en este periodo', 20, 50);
        }
        
        // TABLA DE RESUMEN
        let periodoTexto = periodo === 'dia' ? 'día' : (periodo === 'semana' ? 'semana' : 'mes');
        let htmlTabla = `<div style="margin-bottom:10px; font-size:12px; color:#666;">📌 Comparado con ${agentes[0]?.diasMultiplicador || 1} días laborales (${periodoTexto})</div>
        <table>
            <thead>
                <tr style="background:#1e4663; color:white;">
                    <th>Agente</th>
                    <th>Días</th>
                    <th>Llamadas</th>
                    <th>T. Disp</th>
                    <th>T. Llamada</th>
                    <th>🔌 Conexión (Total Minutes)</th>
                    <th>🍽️ Comida/Break</th>
                    <th>🚿 Baño</th>
                    <th>⏪ Retro</th>
                </tr>
            </thead>
            <tbody>`;
        
        agentes.forEach(a => {
            let tipo = getTipo(a.nombre);
            let limites = REGLAS[tipo];
            let conexionReqHoras = a.conexionEsperadaHoras;
            let conexionRealHoras = a.totalConexionMinutos / 60;
            
            // Conexión: MENOS de su tiempo es MALO (rojo), MÁS de su tiempo es BUENO (verde)
            let conexionClase = a.diffConexion >= 0 ? 'exceso-bueno' : 'falta-malo';
            let conexionTexto = a.diffConexion > 0 ? `✅ Excede ${(a.diffConexion/60).toFixed(1)} h` : 
                               (a.diffConexion < 0 ? `❌ Falta ${(-a.diffConexion/60).toFixed(1)} h` : `✅ Exacto ${conexionReqHoras}h`);
            
            // Pausas: valores positivos = exceso (malo), negativos = tiempo disponible (bueno)
            let comidaClase = a.diffComida > 0 ? 'falta-malo' : (a.diffComida < 0 ? 'exceso-bueno' : 'ok');
            let banoClase = a.diffBano > 0 ? 'falta-malo' : (a.diffBano < 0 ? 'exceso-bueno' : 'ok');
            let retroClase = a.diffRetro > 0 ? 'falta-malo' : (a.diffRetro < 0 ? 'exceso-bueno' : 'ok');
            
            let comidaTexto = a.diffComida > 0 ? `❌ Excede ${a.diffComida.toFixed(1)} min` : 
                              (a.diffComida < 0 ? `✅ Tiene ${(-a.diffComida).toFixed(1)} min disponible` : '✅ OK');
            let banoTexto = a.diffBano > 0 ? `❌ Excede ${a.diffBano.toFixed(1)} min` : 
                            (a.diffBano < 0 ? `✅ Tiene ${(-a.diffBano).toFixed(1)} min disponible` : '✅ OK');
            let retroTexto = a.diffRetro > 0 ? `❌ Excede ${a.diffRetro.toFixed(1)} min` : 
                             (a.diffRetro < 0 ? `✅ Tiene ${(-a.diffRetro).toFixed(1)} min disponible` : '✅ OK');
            
            // Mostrar el límite esperado según periodo
            let comidaEsperada = limites.comida * a.diasMultiplicador;
            let banoEsperada = limites.bano * a.diasMultiplicador;
            let retroEsperada = limites.retro * a.diasMultiplicador;
            
            htmlTabla += `<tr>
                <td><strong>${a.nombre}</strong><br><span style="font-size:10px; color:#666;">${tipo === 'especial' ? '🟢 Medio tiempo' : '🔵 Tiempo completo'}</span></td>
                <td>${a.registros} días (${a.diasMultiplicador} esperados)</td>
                <td>${a.llamadas}</td>
                <td>${formatearTiempo(a.disponible)}</td>
                <td>${formatearTiempo(a.enLlamada)}</td>
                <td class="${conexionClase}"><strong>${conexionRealHoras.toFixed(1)}h / ${conexionReqHoras}h</strong><br><small>📊 Total: ${a.totalConexionMinutos.toFixed(1)} min</small><br>${conexionTexto}</td>
                <td class="${comidaClase}"><small>Esperado: ${comidaEsperada} min</small><br>${comidaTexto}</td>
                <td class="${banoClase}"><small>Esperado: ${banoEsperada} min</small><br>${banoTexto}</td>
                <td class="${retroClase}"><small>Esperado: ${retroEsperada} min</small><br>${retroTexto}</td>
            </tr>`;
        });
        htmlTabla += `</tbody></table>`;
        document.getElementById('tablaResumen').innerHTML = htmlTabla;
    }
    
    // Event listeners con actualización correcta
    const periodoSelect = document.getElementById('periodoSelect');
    const valorSelect = document.getElementById('valorSelect');
    const refreshBtn = document.getElementById('refreshBtn');
    
    function handlePeriodoChange() {
        actualizarOpciones(periodoSelect.value);
        renderDashboard();
    }
    
    function handleValorChange() {
        renderDashboard();
    }
    
    periodoSelect.addEventListener('change', handlePeriodoChange);
    valorSelect.addEventListener('change', handleValorChange);
    refreshBtn.addEventListener('click', renderDashboard);
    
    // Inicializar
    actualizarOpciones('dia');
    renderDashboard();
</script>
</body>
</html>
